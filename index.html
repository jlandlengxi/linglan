<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>铃兰 · 世家</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            color: #ffffff;
            overflow-x: hidden;
            line-height: 1.5;
            background: #000000;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* 纯黑动态背景 */
        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            background: #000000;
            overflow: hidden;
        }

        .bg-animation::before {
            content: "";
            position: absolute;
            width: 200%;
            height: 200%;
            top: -50%;
            left: -50%;
            background: 
                radial-gradient(circle at 20% 30%, rgba(30, 100, 200, 0.12) 0%, transparent 30%),
                radial-gradient(circle at 80% 70%, rgba(100, 50, 200, 0.1) 0%, transparent 35%),
                radial-gradient(circle at 50% 50%, rgba(0, 150, 255, 0.06) 0%, transparent 40%),
                radial-gradient(circle at 10% 80%, rgba(200, 100, 50, 0.05) 0%, transparent 30%),
                radial-gradient(circle at 90% 20%, rgba(50, 200, 150, 0.04) 0%, transparent 30%);
            animation: bgShift 25s infinite alternate ease-in-out;
        }

        @keyframes bgShift {
            0% { transform: translate(0, 0) rotate(0deg); opacity: 0.6; }
            50% { transform: translate(-5%, -3%) rotate(2deg); opacity: 1; }
            100% { transform: translate(3%, 5%) rotate(-1deg); opacity: 0.7; }
        }

        /* 流动光线 */
        .bg-animation::after {
            content: "";
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            background: repeating-linear-gradient(
                45deg,
                transparent 0px,
                transparent 100px,
                rgba(100, 180, 255, 0.015) 100px,
                rgba(100, 180, 255, 0.015) 101px
            );
            animation: lightFlow 40s infinite linear;
        }

        @keyframes lightFlow {
            0% { background-position: 0 0; }
            100% { background-position: 200px 200px; }
        }

        /* 粒子光点 */
        .particles {
            position: fixed;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        .particle {
            position: absolute;
            width: 2px;
            height: 2px;
            background: #ffffff;
            border-radius: 50%;
            opacity: 0;
            animation: particleFloat 8s infinite ease-in-out;
            box-shadow: 0 0 10px #4a9eff, 0 0 20px #2a6df4;
        }

        @keyframes particleFloat {
            0%, 100% { opacity: 0; transform: translateY(0) scale(0.5); }
            20% { opacity: 0.8; transform: translateY(-20px) scale(1); }
            80% { opacity: 0.4; transform: translateY(-80px) scale(0.8); }
        }

        .content-wrapper {
            position: relative;
            z-index: 10;
        }

        /* 炫酷导航栏 - 黑色主题 */
        .navbar {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 1400px;
            padding: 16px 32px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(30px) saturate(200%);
            -webkit-backdrop-filter: blur(30px) saturate(200%);
            border: 1px solid rgba(100, 180, 255, 0.2);
            border-radius: 60px;
            z-index: 100;
            box-shadow: 
                0 20px 40px -15px rgba(0, 0, 0, 0.8),
                0 0 0 1px rgba(64, 128, 255, 0.1) inset,
                0 0 30px rgba(64, 128, 255, 0.1);
            animation: navGlow 3s infinite alternate;
        }

        @keyframes navGlow {
            0% { box-shadow: 0 20px 40px -15px rgba(0,0,0,0.8), 0 0 0 1px rgba(64,128,255,0.1) inset, 0 0 20px rgba(64,128,255,0.1); }
            100% { box-shadow: 0 20px 40px -15px rgba(0,0,0,0.8), 0 0 0 1px rgba(100,180,255,0.2) inset, 0 0 40px rgba(64,128,255,0.2); }
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 800;
            letter-spacing: 2px;
            background: linear-gradient(135deg, #ffffff 0%, #a0d0ff 40%, #6ab0ff 60%, #c0e0ff 100%);
            background-size: 200% 200%;
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-decoration: none;
            text-shadow: 0 0 40px rgba(100, 180, 255, 0.5);
            animation: logoShine 4s infinite alternate;
        }

        @keyframes logoShine {
            0% { background-position: 0% 50%; filter: brightness(1); }
            100% { background-position: 100% 50%; filter: brightness(1.2); }
        }

        .nav-right {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .member-count {
            color: #b0d0ff;
            font-size: 14px;
            font-weight: 500;
            padding: 8px 18px;
            background: rgba(64, 128, 255, 0.12);
            border-radius: 40px;
            border: 1px solid rgba(100, 180, 255, 0.3);
            backdrop-filter: blur(10px);
            letter-spacing: 0.5px;
            box-shadow: 0 0 20px rgba(64, 128, 255, 0.1);
        }

        .menu-btn {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, rgba(64, 128, 255, 0.15), rgba(100, 180, 255, 0.08));
            border: 1px solid rgba(100, 180, 255, 0.3);
            border-radius: 30px;
            color: #e0f0ff;
            font-size: 22px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
            box-shadow: 0 0 20px rgba(64, 128, 255, 0.2);
        }

        .menu-btn:hover {
            background: linear-gradient(135deg, rgba(100, 180, 255, 0.25), rgba(64, 128, 255, 0.15));
            border-color: rgba(150, 200, 255, 0.5);
            box-shadow: 0 0 30px rgba(100, 180, 255, 0.4);
            transform: scale(1.05);
        }

        /* 弹出菜单 - 黑色主题 */
        .popup-menu {
            position: fixed;
            top: 100px;
            right: 5%;
            width: 360px;
            max-height: 65vh;
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(40px) saturate(200%);
            -webkit-backdrop-filter: blur(40px) saturate(200%);
            border: 1px solid rgba(100, 180, 255, 0.25);
            border-radius: 28px;
            padding: 20px 0;
            z-index: 99;
            opacity: 0;
            visibility: hidden;
            transform: translateY(-10px) scale(0.98);
            transition: all 0.25s cubic-bezier(0.2, 0.9, 0.4, 1);
            overflow-y: auto;
            box-shadow: 
                0 30px 60px -20px rgba(0, 0, 0, 0.9),
                0 0 0 1px rgba(64, 128, 255, 0.1) inset,
                0 0 40px rgba(64, 128, 255, 0.15);
        }

        .popup-menu.active {
            opacity: 1;
            visibility: visible;
            transform: translateY(0) scale(1);
        }

        .popup-section {
            padding: 14px 22px;
            border-bottom: 1px solid rgba(100, 150, 255, 0.08);
        }

        .popup-section:last-child {
            border-bottom: none;
        }

        .popup-section-title {
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            background: linear-gradient(135deg, #80b0ff, #c0d8ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 14px;
        }

        .popup-menu-links {
            padding: 10px 22px 16px;
            border-bottom: 1px solid rgba(100, 150, 255, 0.08);
        }

        .popup-menu-links a {
            display: block;
            color: #d0e4ff;
            text-decoration: none;
            font-size: 15px;
            font-weight: 500;
            padding: 12px 16px;
            border-radius: 14px;
            transition: all 0.2s ease;
            background: linear-gradient(90deg, transparent, transparent);
        }

        .popup-menu-links a:hover {
            background: linear-gradient(90deg, rgba(64, 128, 255, 0.2), rgba(100, 180, 255, 0.1));
            color: #ffffff;
            padding-left: 24px;
            box-shadow: 0 0 20px rgba(64, 128, 255, 0.1);
        }

        .member-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 6px 8px;
        }

        .member-tag {
            color: #b8d0f0;
            font-size: 12px;
            padding: 4px 10px;
            background: rgba(64, 128, 255, 0.08);
            border-radius: 30px;
            border: 1px solid rgba(100, 150, 255, 0.12);
            transition: all 0.15s;
        }

        .member-tag:hover {
            background: rgba(64, 128, 255, 0.18);
            border-color: rgba(100, 180, 255, 0.3);
            color: #e8f0ff;
        }

        /* 主视觉 */
        .hero {
            width: 100%;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 100px 24px 60px;
            position: relative;
        }

        .hero::before {
            content: "";
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            background: radial-gradient(circle at 50% 40%, rgba(64, 128, 255, 0.06) 0%, transparent 60%);
            pointer-events: none;
        }

        .hero-content {
            max-width: 800px;
            animation: heroFade 1.2s cubic-bezier(0.2, 0.9, 0.4, 1) forwards;
        }

        @keyframes heroFade {
            0% { opacity: 0; transform: translateY(50px) scale(0.95); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }

        .hero-image-wrapper {
            max-width: 480px;
            margin: 0 auto 40px;
            border-radius: 32px;
            overflow: hidden;
            box-shadow: 
                0 40px 80px -20px rgba(0, 0, 0, 0.9),
                0 0 0 2px rgba(100, 180, 255, 0.2),
                0 0 60px rgba(64, 128, 255, 0.3);
            transition: box-shadow 0.5s ease;
        }

        .hero-image-wrapper:hover {
            box-shadow: 
                0 50px 100px -20px rgba(0, 0, 0, 1),
                0 0 0 2px rgba(150, 200, 255, 0.3),
                0 0 80px rgba(64, 128, 255, 0.5);
        }

        .hero-image-wrapper img {
            width: 100%;
            height: auto;
            display: block;
            filter: brightness(1.05) contrast(1.1);
        }

        h1 {
            font-size: clamp(52px, 10vw, 96px);
            font-weight: 900;
            letter-spacing: -1px;
            margin-bottom: 20px;
            background: linear-gradient(135deg, #ffffff 0%, #d0e8ff 30%, #80b8ff 60%, #c0e0ff 100%);
            background-size: 200% 200%;
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 80px rgba(64, 128, 255, 0.6);
            line-height: 1.1;
            animation: titleGlow 3s infinite alternate;
        }

        @keyframes titleGlow {
            0% { filter: brightness(1); text-shadow: 0 0 60px rgba(64, 128, 255, 0.4); }
            100% { filter: brightness(1.15); text-shadow: 0 0 100px rgba(100, 180, 255, 0.7); }
        }

        .hero-subtitle {
            font-size: 20px;
            font-weight: 500;
            color: #a8c8f0;
            margin-bottom: 48px;
            letter-spacing: 4px;
            text-transform: uppercase;
            text-shadow: 0 0 30px rgba(100, 180, 255, 0.4);
        }

        .btn-primary {
            display: inline-block;
            padding: 18px 56px;
            background: linear-gradient(135deg, #1a5fdf 0%, #2a7dff 50%, #4a9aff 100%);
            background-size: 200% 200%;
            border: none;
            border-radius: 60px;
            color: white;
            font-weight: 700;
            font-size: 18px;
            text-decoration: none;
            letter-spacing: 2px;
            box-shadow: 
                0 20px 40px -10px rgba(26, 95, 223, 0.5),
                0 0 0 1px rgba(255, 255, 255, 0.2) inset,
                0 0 40px rgba(42, 125, 255, 0.4);
            transition: all 0.3s ease;
            backdrop-filter: blur(5px);
            text-transform: uppercase;
            position: relative;
            overflow: hidden;
        }

        .btn-primary::before {
            content: "";
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: left 0.5s;
        }

        .btn-primary:hover {
            transform: translateY(-5px) scale(1.02);
            box-shadow: 
                0 30px 60px -10px rgba(42, 125, 255, 0.7),
                0 0 0 1px rgba(255, 255, 255, 0.3) inset,
                0 0 60px rgba(74, 154, 255, 0.6);
            background-position: 100% 50%;
        }

        .btn-primary:hover::before {
            left: 100%;
        }

        /* 关于模块 */
        .about-section {
            padding: 80px 6% 60px;
            text-align: center;
            position: relative;
        }

        .about-title {
            font-size: 42px;
            font-weight: 800;
            margin-bottom: 24px;
            background: linear-gradient(135deg, #e8f4ff, #90c0ff, #d0e8ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.5px;
            text-shadow: 0 0 40px rgba(100, 180, 255, 0.3);
        }

        .about-desc {
            font-size: 22px;
            font-weight: 400;
            color: #c0d8f0;
            max-width: 700px;
            margin: 0 auto;
            line-height: 1.8;
            text-shadow: 0 0 20px rgba(100, 180, 255, 0.2);
        }

        /* 人物卡片 - 黑色主题 */
        .members-section {
            padding: 60px 6% 60px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .section-header {
            text-align: center;
            font-size: 42px;
            font-weight: 800;
            margin-bottom: 60px;
            background: linear-gradient(135deg, #ffffff, #a0d0ff, #e0f0ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: 2px;
            text-shadow: 0 0 50px rgba(100, 180, 255, 0.4);
        }

        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 35px;
        }

        .member-card {
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(20px) saturate(200%);
            -webkit-backdrop-filter: blur(20px) saturate(200%);
            border: 1px solid rgba(80, 160, 255, 0.2);
            border-radius: 32px;
            padding: 48px 24px;
            text-align: center;
            transition: all 0.4s cubic-bezier(0.2, 0.9, 0.4, 1);
            box-shadow: 
                0 25px 50px -15px rgba(0, 0, 0, 0.7),
                0 0 0 1px rgba(64, 128, 255, 0.1) inset,
                0 0 30px rgba(64, 128, 255, 0.1);
            position: relative;
            overflow: hidden;
        }

        .member-card::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 50% 0%, rgba(100, 180, 255, 0.15), transparent 70%);
            opacity: 0;
            transition: opacity 0.4s;
        }

        .member-card:hover {
            border-color: rgba(100, 200, 255, 0.5);
            box-shadow: 
                0 25px 50px -15px rgba(0, 0, 0, 0.8),
                0 0 0 1px rgba(100, 180, 255, 0.3) inset,
                0 0 50px rgba(64, 128, 255, 0.3);
        }

        .member-card:hover::before {
            opacity: 1;
        }

        .member-card h3 {
            font-size: 34px;
            font-weight: 800;
            margin-bottom: 16px;
            background: linear-gradient(135deg, #ffffff, #c0e0ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            position: relative;
            z-index: 1;
        }

        .member-card p {
            color: #a0c0e8;
            font-size: 16px;
            font-weight: 500;
            margin-bottom: 6px;
            position: relative;
            z-index: 1;
        }

        /* 成员列表 */
        .all-members-section {
            padding: 60px 6% 100px;
            max-width: 1500px;
            margin: 0 auto;
        }

        .members-block {
            margin-bottom: 50px;
        }

        .block-header {
            display: flex;
            align-items: baseline;
            gap: 16px;
            margin-bottom: 24px;
            padding-bottom: 14px;
            border-bottom: 1px solid rgba(100, 180, 255, 0.15);
        }

        .block-title {
            font-size: 24px;
            font-weight: 700;
            background: linear-gradient(135deg, #d0e8ff, #80b0ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .block-count {
            font-size: 15px;
            color: #6080b0;
            font-weight: 400;
        }

        .name-text-list {
            columns: 6 140px;
            column-gap: 20px;
        }

        .name-item {
            color: #a0b8d4;
            font-size: 14px;
            padding: 3px 0;
            break-inside: avoid;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            transition: color 0.15s;
        }

        .name-item:hover {
            color: #c0dcff;
        }

        /* 页脚 - 黑色主题 */
        .footer {
            padding: 45px 6%;
            text-align: center;
            color: #6080a8;
            border-top: 1px solid rgba(100, 150, 255, 0.1);
            font-size: 15px;
            font-weight: 400;
            letter-spacing: 1px;
            background: linear-gradient(180deg, transparent, rgba(64, 128, 255, 0.02));
            text-shadow: 0 0 20px rgba(100, 180, 255, 0.2);
        }

        /* 滚动条 */
        .popup-menu::-webkit-scrollbar {
            width: 4px;
        }

        .popup-menu::-webkit-scrollbar-track {
            background: transparent;
        }

        .popup-menu::-webkit-scrollbar-thumb {
            background: linear-gradient(180deg, #4a9aff, #2a6df4);
            border-radius: 4px;
        }

        /* 响应式 */
        @media (max-width: 900px) {
            .name-text-list { columns: 4 120px; }
            .navbar { width: 95%; padding: 14px 20px; }
        }

        @media (max-width: 600px) {
            .navbar { padding: 12px 16px; }
            .logo { font-size: 1.4rem; }
            .member-count { display: none; }
            .popup-menu { width: 90%; right: 5%; }
            h1 { font-size: 44px; }
            .hero-subtitle { font-size: 16px; letter-spacing: 2px; }
            .btn-primary { padding: 15px 36px; font-size: 16px; }
            .about-title { font-size: 32px; }
            .section-header { font-size: 32px; }
            .name-text-list { columns: 3 100px; }
        }

        @media (max-width: 400px) {
            .name-text-list { columns: 2 110px; }
        }
    </style>
</head>
<body>

    <div class="particles" id="particles"></div>

    <script>
        (function(){
            const particles = document.getElementById('particles');
            for (let i = 0; i < 30; i++) {
                const p = document.createElement('div');
